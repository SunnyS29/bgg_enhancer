<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>BGG Price Compare AU</title>
</head>
<body>
  <div class="popup">
    <div class="popup-header">
      <h1>🇦🇺 BGG Price Compare AU</h1>
      <span class="version">v2.0</span>
    </div>

    <div class="popup-body">
      <div class="setting-group">
        <label for="bgg-username">BGG Username</label>
        <input type="text" id="bgg-username" placeholder="Your BoardGameGeek username">
        <p class="setting-hint">Optional — for future price alert features</p>
      </div>

      <button id="save-btn" class="save-btn">Save Settings</button>
      <div id="save-status" class="save-status"></div>

      <div class="store-list">
        <p class="store-list-title">Stores we compare:</p>
        <ul>
          <li>Gameology</li>
          <li>GUF</li>
          <li>Board Game Master</li>
          <li>Games Empire</li>
          <li>Good Games</li>
          <li>Vault Games</li>
          <li>eBay AU</li>
        </ul>
      </div>
    </div>

    <div class="popup-footer">
      <a href="https://boardgamegeek.com" target="_blank">BoardGameGeek</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
